<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Syntra{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Syntra</a>
      <nav>
        {% if user %}
          <a href="/app">Dashboard</a>
          <a href="/app/projects">Projects</a>
          <a href="/app/bugs">Bugs</a>
          <a href="/app/approvals">Approvals</a>
          <a href="/app/team">Team</a>
          <a href="/app/billing">Billing</a>
          <a href="/app/github">GitHub</a>
          <a href="/app/slack">Slack</a>
          <form method="post" action="/auth/logout" class="nav-form"><button type="submit">Sign out</button></form>
        {% else %}
          <a href="/auth/sign-in">Sign in</a>
          <a class="nav-cta" href="/auth/sign-up">Create workspace</a>
        {% endif %}
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
