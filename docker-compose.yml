services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: syntra
      POSTGRES_USER: syntra
      POSTGRES_PASSWORD: syntra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntra -d syntra"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace/repos
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
